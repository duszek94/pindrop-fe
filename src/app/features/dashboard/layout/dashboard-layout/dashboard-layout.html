<div class="dashboard-shell">
  <header class="dashboard-header">
    <div class="dashboard-header__inner">
      <a routerLink="/" class="dashboard-logo" aria-label="Pindrop home">
        <span class="dashboard-logo__icon" aria-hidden="true">
          <i class="pi pi-map-marker"></i>
        </span>
        <span class="dashboard-logo__text">{{ 'brand.name' | translate }}</span>
      </a>

      <div class="dashboard-header__actions">
        <button
          type="button"
          class="dashboard-icon-btn"
          [attr.aria-label]="'dashboard.notifications' | translate"
        >
          <i class="pi pi-bell" aria-hidden="true"></i>
          @if (unreadCount() > 0) {
            <span class="dashboard-icon-btn__badge" aria-hidden="true">
              {{ unreadCount() > 9 ? '9+' : unreadCount() }}
            </span>
          }
        </button>
        <button
          type="button"
          class="dashboard-profile-btn"
          [attr.aria-label]="'dashboard.profileMenu' | translate"
          (click)="logout()"
        >
          <app-user-avatar [user]="avatarUser()" />
        </button>
      </div>
    </div>
  </header>

  <main class="dashboard-main" [class.dashboard-main--flush]="flushMain()">
    <router-outlet />
  </main>

  <nav class="dashboard-bottom-nav" [attr.aria-label]="'dashboard.nav.label' | translate">
    @for (item of navItems; track item.id) {
      <a
        [routerLink]="item.route"
        routerLinkActive="dashboard-bottom-nav__link--active"
        [routerLinkActiveOptions]="{ exact: item.route === '/' }"
        class="dashboard-bottom-nav__link"
      >
        <i [class]="'pi ' + item.icon" aria-hidden="true"></i>
        <span>{{ item.labelKey | translate }}</span>
      </a>
    }
  </nav>
</div>
