<div class="pindrop-auth-card" @staggerFadeSlide>
  <h1 class="pindrop-auth-heading animate-item">{{ 'auth.resetPassword.title' | translate }}</h1>
  <p class="pindrop-auth-subheading animate-item">{{ 'auth.resetPassword.subtitle' | translate }}</p>

  @if (errorMessage(); as message) {
    <p-message severity="error" [text]="message" styleClass="animate-item w-full" />
  }

  @if (successMessage(); as message) {
    <p-message severity="success" [text]="message" styleClass="animate-item w-full" />
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <div class="animate-item auth-form__field">
      <label class="pindrop-field-label" for="newPassword">{{
        'auth.resetPassword.newPassword' | translate
      }}</label>
      <p-password
        inputId="newPassword"
        formControlName="newPassword"
        [toggleMask]="true"
        [placeholder]="'auth.resetPassword.newPasswordPlaceholder' | translate"
        autocomplete="new-password"
      />
    </div>

    <div class="animate-item auth-form__field">
      <label class="pindrop-field-label" for="confirmPassword">{{
        'auth.resetPassword.confirmPassword' | translate
      }}</label>
      <p-password
        inputId="confirmPassword"
        formControlName="confirmPassword"
        [feedback]="false"
        [toggleMask]="true"
        [placeholder]="'auth.resetPassword.confirmPasswordPlaceholder' | translate"
        autocomplete="new-password"
      />
    </div>

    <div class="animate-item auth-form__actions">
      <p-button
        type="submit"
        [label]="'auth.resetPassword.submit' | translate"
        icon="pi pi-check"
        iconPos="right"
        styleClass="pindrop-primary-btn w-full"
        [loading]="loading()"
        [disabled]="!token()"
      />
    </div>
  </form>

  <p class="pindrop-footer-text animate-item">
    <a routerLink="/auth/login" class="pindrop-link">{{
      'auth.resetPassword.backToSignIn' | translate
    }}</a>
  </p>
</div>
